<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi Bingo</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .box { background: #2d2d44; padding: 10px; border-radius: 8px; flex: 1; margin: 5px; border: 1px solid #4ecca3; }
        .val { display: block; font-size: 16px; font-weight: bold; color: #4ecca3; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 15px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #pre-game, #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 2000; padding: 10px; box-sizing: border-box; }
        .timer-circle { width: 70px; height: 70px; border: 5px solid #ff4757; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 10px auto; color: #ff4757; }
        .ball { width: 75px; height: 75px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; margin: 10px auto; color: #1a1e2e; border: 3px solid white; box-shadow: 0 0 15px #4ecca3; }
        .card-container { background: white; padding: 8px; border-radius: 12px; margin: 0 auto; width: 100%; max-width: 340px; }
        .b-h { display: grid; grid-template-columns: repeat(5, 1fr); margin-bottom: 5px; background: #2d2d44; border-radius: 5px; padding: 5px 0; }
        .b-h div { color: #4ecca3; font-size: 20px; font-weight: bold; }
        .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .cell { border: 1px solid #eee; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 15px; color: #333; background: #fdfdfd; }
        .marked { background: #4ecca3 !important; color: white; border: none; }
    </style>
</head>
<body>

    <div id="main">
        <div class="stats">
            <div class="box">Main<span class="val">0.00</span></div>
            <div class="box">Play<span class="val">0.00</span></div>
            <div class="box">Stake<span class="val">10</span></div>
        </div>
        <h2 style="color: #4ecca3;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mGrid"></div>
    </div>

    <div id="pre-game">
        <h3 id="sel-txt" style="color: #4ecca3; margin: 5px;">ካርቴላ ቁጥር --</h3>
        <div class="timer-circle" id="timer">30</div>
        <div class="card-container">
            <div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="pre-board"></div>
        </div>
    </div>

    <div id="game">
        <div id="num-ball" class="ball">--</div>
        <div class="card-container">
            <div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="game-board"></div>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:20px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; font-size:18px; color:#1a1a2e;">BINGO!</button>
    </div>

    <script>
        const mGrid = document.getElementById('mGrid');
        for (let i = 1; i <= 16; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn'; b.innerText = i;
            b.onclick = () => startTimer(i);
            mGrid.appendChild(b);
        }

        function getBingoNums() {
            let c = [];
            c.push(gn(1, 15), gn(16, 30), gn(31, 45), gn(46, 60), gn(61, 75));
            let final = [];
            for(let r=0; r<5; r++) {
                for(let col=0; col<5; col++) {
                    final.push(c[col][r]);
                }
            }
            return final;
        }

        function gn(min, max) {
            let a = [];
            while(a.length < 5) {
                let r = Math.floor(Math.random() * (max - min + 1)) + min;
                if(!a.includes(r)) a.push(r);
            }
            return a;
        }

        function startTimer(id) {
            document.getElementById('main').style.display = 'none';
            document.getElementById('pre-game').style.display = 'block';
            document.getElementById('sel-txt').innerText = "ካርቴላ ቁጥር " + id;
            
            let nums = getBingoNums();
            let h = "";
            nums.forEach((n, i) => {
                let v = (i === 12) ? "FREE" : n;
                h += `<div class="cell ${i===12?'marked':''}" id="c-${v}">${v}</div>`;
            });
            document.getElementById('pre-board').innerHTML = h;
            document.getElementById('game-board').innerHTML = h;

            let t = 30;
            let cd = setInterval(() => {
                t--; document.getElementById('timer').innerText = t;
                if(t <= 0) { clearInterval(cd); runGame(); }
            }, 1000);
        }

        function runGame() {
            document.getElementById('pre-game').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;
            setInterval(() => {
                if(idx < 75) {
                    let n = pool[idx];
                    let L = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
                    document.getElementById('num-ball').innerText = L + "-" + n;
                    let cell = document.querySelector(`#game-board #c-${n}`);
                    if(cell) cell.classList.add('marked');
                    idx++;
                }
            }, 3000);
        }
    </script>
</body>
</html>
