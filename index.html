<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawi Bingo Bot</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .box { background: #2d2d44; padding: 10px; border-radius: 8px; flex: 1; margin: 5px; border: 1px solid #4ecca3; }
        .val { display: block; font-size: 16px; font-weight: bold; color: #4ecca3; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 20px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; padding: 20px; box-sizing: border-box; }
        .ball { width: 80px; height: 80px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin: 20px auto; color: #1a1a2e; border: 4px solid white; }
        .card { background: white; color: #333; padding: 10px; border-radius: 10px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cell { border: 1px solid #ddd; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 16px; }
        .marked { background: #4ecca3 !important; color: white; }
    </style>
</head>
<body>
    <div id="main">
        <div class="stats">
            <div class="box">Main<span class="val">0.00</span></div>
            <div class="box">Play<span class="val">0.00</span></div>
            <div class="box">Stake<span class="val">10</span></div>
        </div>
        <h2 style="color: #4ecca3;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mGrid"></div>
    </div>

    <div id="game">
        <div id="num" class="ball">--</div>
        <div class="card" id="board"></div>
        <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:30px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; font-size:18px;">BINGO!</button>
    </div>

    <script>
        // 1. መጀመሪያ ቁጥሮቹን (1-16) በስክሪኑ ላይ እንዲወጡ እናደርጋለን
        const mGrid = document.getElementById('mGrid');
        for (let i = 1; i <= 16; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn';
            b.innerText = i;
            b.onclick = () => start(i);
            mGrid.appendChild(b);
        }

        // 2. ቁጥር ሲነካ ጨዋታው ይጀምራል
        function start(id) {
            document.getElementById('main').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            
            let board = document.getElementById('board');
            for(let i=0; i<25; i++) {
                let v = (i==12) ? "FREE" : Math.floor(Math.random()*75)+1;
                board.innerHTML += `<div class="cell ${i==12?'marked':''}" id="c${v}">${v}</div>`;
            }
            
            // 3. በየ 3 ሰከንዱ አዲስ ቁጥር ማውጣት
            setInterval(() => {
                let n = Math.floor(Math.random()*75)+1;
                document.getElementById('num').innerText = n;
                let found = document.getElementById('c' + n);
                if(found) found.classList.add('marked');
            }, 3000);
        }
    </script>
</body>
</html>
