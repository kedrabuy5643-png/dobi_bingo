<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo Mobile</title>
    <style>
        /* ለሞባይል ስክሪን የተመጣጠነ ዲዛይን */
        body { background:#1a1a2e; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:10px; overflow-x:hidden; }
        .stats { display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
        .box { background:#2d2d44; padding:10px; border-radius:8px; border:1px solid #4ecca3; flex:1; max-width:120px; font-size:14px; }
        .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; padding:10px; }
        .btn { background:#4ecca3; color:#1a1a2e; border:none; padding:15px 0; border-radius:8px; font-weight:bold; font-size:18px; cursor:pointer; }
        
        #pre, #game { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; padding:15px; box-sizing:border-box; z-index:100; }
        
        /* የኳስ ዲዛይን */
        .ball { width:100px; height:100px; background:#4ecca3; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:28px; font-weight:bold; margin:20px auto; color:#1a1a2e; border:5px solid #fff; box-shadow:0 0 20px rgba(78,204,163,0.5); }
        .ball span { font-size:16px; margin-bottom:-5px; }
        
        /* የካርቴላ ዲዛይን */
        .card-container { background:#fff; padding:10px; border-radius:12px; margin:0 auto; max-width:350px; width:100%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .b-header { display:grid; grid-template-columns:repeat(5, 1fr); background:#2d2d44; color:#4ecca3; font-weight:bold; padding:10px 0; border-radius:8px 8px 0 0; font-size:18px; }
        .card { display:grid; grid-template-columns:repeat(5, 1fr); gap:5px; margin-top:5px; }
        .cell { border:1px solid #ddd; height:50px; display:flex; align-items:center; justify-content:center; font-weight:bold; border-radius:50%; font-size:16px; color:#333; background:#f0f0f0; transition: 0.3s; }
        
        /* የተመረጠ ቁጥር አረንጓዴ እንዲሆን */
        .mk { background:#4ecca3 !important; color:#fff !important; border:none !important; transform: scale(1.05); }
        
        .stop-btn { width:100%; max-width:350px; padding:18px; margin-top:25px; background:#ff4757; color:white; border:none; border-radius:10px; font-weight:bold; font-size:18px; cursor:pointer; }
    </style>
</head>
<body onload="init()">
    <div id="main">
        <div class="stats">
            <div class="box">Wallet<br>0.00</div>
            <div class="box">Stake<br>10</div>
        </div>
        <h2 style="color:#4ecca3; margin-top:30px;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h3 id="sT" style="color:#4ecca3">--</h3>
        <div style="font-size:50px; color:#ff4757; font-weight:bold; margin-bottom:15px;" id="tm">30</div>
        <div class="card-container">
            <div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="pB"></div>
        </div>
    </div>

    <div id="game">
        <div id="bl" class="ball"><span>LETTER</span>--</div>
        <div class="card-container">
            <div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="gB"></div>
        </div>
        <button class="stop-btn" onclick="location.reload()">አቁም</button>
    </div>

    <script>
        let sid, active = false, loop, checker;
        const gn = (a, b) => { let r = []; while(r.length < 5){ let v = Math.floor(Math.random() * (b - a + 1)) + a; if(!r.includes(v)) r.push(v); } return r; };

        function init() {
            let h = ""; for(let i=1; i<=16; i++) h += `<button class="btn" onclick="sel(${i})">${i}</button>`;
            document.getElementById('mG').innerHTML = h;
        }

        function sel(n) {
            sid = n; 
            document.getElementById('main').style.display='none'; 
            document.getElementById('pre').style.display='block';
            
            let cols = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)];
            let h = "";
            for(let r=0; r<5; r++) {
                for(let c=0; c<5; c++) {
                    let v = (r==2 && c==2) ? 'FREE' : cols[c][r];
                    h += `<div class="cell ${v=='FREE'?'mk':''}" id="cell-${r}-${c}">${v}</div>`;
                }
            }
            document.getElementById('pB').innerHTML = h;
            document.getElementById('gB').innerHTML = h;
            
            let t = 30;
            let cd = setInterval(() => { 
                t--; 
                document.getElementById('tm').innerText = t; 
                if(t <= 0) { clearInterval(cd); start(); } 
            }, 1000);
        }

        function checkWinner() {
            if(!active) return;
            const card = document.getElementById('gB');
            const cells = card.getElementsByClassName('cell');
            
            const wins = [
               ,,,,, // አግድም
               ,,,,, // ቀጥታ
               ,, // አያያዝ
                // 4 ማዕዘን
            ];

            for(let combo of wins) {
                if(combo.every(idx => cells[idx].classList.contains('mk'))) {
                    active = false;
                    clearInterval(loop);
                    clearInterval(checker);
                    setTimeout(() => {
                        alert("🎉 ቢንጎ! ካርቴላ " + sid + " አሸንፏል!");
                        location.reload();
                    }, 500);
                    return;
                }
            }
        }

        function start() {
            active = true;
            document.getElementById('pre').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            
            let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;
            
            // ቁጥር በየ 3 ሰከንዱ የሚጠራበት
            loop = setInterval(() => {
                if(!active || idx >= 75) return;
                let n = nums[idx++];
                let l = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
                document.getElementById('bl').innerHTML = `<span>${l}</span>${n}`;
                
                // ካርቴላው ላይ ቁጥሩን መፈለግ
                const cells = document.querySelectorAll('#gB .cell');
                cells.forEach(c => {
                    if(c.innerText == n.toString()) {
                        c.classList.add('mk');
                    }
                });
            }, 3000);

            // አሸናፊ በየ 0.5 ሰከንዱ በከፍተኛ ፍጥነት የሚፈትሽ
            checker = setInterval(checkWinner, 500);
        }
    </script>
</body>
</html>
