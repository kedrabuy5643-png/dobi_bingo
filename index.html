<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo - Fixed</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .header-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #2d2d44; padding: 10px; border-radius: 8px; font-size: 11px; }
        .val { display: block; font-size: 14px; font-weight: bold; color: #4ecca3; }
        
        /* ቁጥሮች መምረጫ */
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; height: 400px; overflow-y: auto; }
        .num-btn { background: #3d3d5c; color: white; border: 1px solid #555; padding: 10px 0; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* የጨዋታ ገጽ */
        #game-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 2000; padding: 10px; box-sizing: border-box; }
        .called-num { width: 80px; height: 80px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin: 15px auto; color: #1a1a2e; border: 4px solid white; }
        
        /* ካርቴላ */
        .mini-cartela { background: white; color: #333; padding: 10px; border-radius: 10px; width: 100%; max-width: 340px; margin: 0 auto; }
        .cartela-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cell { border: 1px solid #eee; padding: 10px 0; font-size: 18px; font-weight: bold; }
        .marked { background: #4ecca3 !important; color: white; border-radius: 50%; }

        /* ፖፕ አፕ */
        #cartela-pop { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: #333; padding: 15px; border-radius: 15px; width: 90%; z-index: 1000; }
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
    </style>
</head>
<body>

    <div id="main-ui">
        <div class="header-stats">
            <div class="stat-box">Main Wallet<span class="val">0.00</span></div>
            <div class="stat-box">Play Wallet<span class="val">0.00</span></div>
            <div class="stat-box">Stake<span class="val">10</span></div>
        </div>
        <div class="grid-container" id="bingoGrid"></div>
    </div>

    <div id="overlay"></div>
    <div id="cartela-pop">
        <div id="timer" style="background:red; color:white; border-radius:10px; margin-bottom:10px;">30s</div>
        <div id="pop-content"></div>
        <button id="pop-btn" onclick="checkAction()" style="width:100%; padding:10px; margin-top:10px; background:#1a1a2e; color:white; border:none; border-radius:5px;">ተመለስ</button>
    </div>

    <div id="game-screen">
        <div id="hist" style="height:30px; overflow:hidden; font-size:12px; margin-bottom:10px;"></div>
        <div class="called-num" id="now-num">--</div>
        <div class="mini-cartela">
            <div class="cartela-grid" id="game-grid"></div>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:20px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold;">BINGO!</button>
    </div>

    <script>
        let myNums = [];
        let timer = 30;
        let tId = null;

        // ቁጥሮችን ፍጠር
        const grid = document.getElementById('bingoGrid');
        for (let i = 1; i <= 100; i++) {
            let b = document.createElement('button');
            b.className = 'num-btn'; b.innerText = i;
            b.onclick = () => showPop(i);
            grid.appendChild(b);
        }

        function showPop(n) {
            let cols = [gen(1,15), gen(16,30), gen(31,45), gen(46,60), gen(61,75)];
            let html = '<div class="cartela-grid">';
            myNums = [];
            for(let r=0; r<5; r++){
                for(let c=0; c<5; c++){
                    let v = (r==2 && c==2) ? "FREE" : cols[c][r];
                    html += `<div class="cell">${v}</div>`;
                    if(v!=="FREE") myNums.push(v);
                }
            }
            html += '</div>';
            document.getElementById('pop-content').innerHTML = html;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('cartela-pop').style.display = 'block';
            
            timer = 30;
            tId = setInterval(() => {
                timer--;
                document.getElementById('timer').innerText = timer + "s";
                if(timer <= 0) {
                    clearInterval(tId);
                    document.getElementById('timer').innerText = "ጨዋታ ጀምር!";
                    document.getElementById('timer').style.background = "green";
                    document.getElementById('pop-btn').innerText = "ወደ ጨዋታው ግባ";
                }
            }, 1000);
        }

        function checkAction() {
            if(document.getElementById('pop-btn').innerText === "ወደ ጨዋታው ግባ") {
                document.getElementById('cartela-pop').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                document.getElementById('game-grid').innerHTML = document.querySelector('#pop-content .cartela-grid').innerHTML;
                startCalling();
            } else {
                clearInterval(tId);
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('cartela-pop').style.display = 'none';
            }
        }

        function startCalling() {
            let all = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let i = 0;
            setInterval(() => {
                if(i >= 75) return;
                let n = all[i];
                let L = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
                document.getElementById('now-num').innerText = L + "-" + n;
                document.getElementById('hist').innerText = n + ", " + document.getElementById('hist').innerText;
                
                document.querySelectorAll('#game-grid .cell').forEach(c => {
                    if(c.innerText == n) c.classList.add('marked');
                });
                i++;
            }, 4000);
        }

        function gen(min, max) {
            let a = []; while(a.length < 5) { let r = Math.floor(Math.random()*(max-min+1))+min; if(!a.includes(r)) a.push(r); } return a;
        }
    </script>
</body>
</html>
