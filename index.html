<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo</title>
    <style>
        body{background:#1a1a2e;color:#fff;font-family:sans-serif;text-align:center;margin:0;padding:5px}
        .stats{display:flex;justify-content:center;gap:5px;margin-bottom:10px}
        .box{background:#2d2d44;padding:5px;border-radius:6px;border:1px solid #4ecca3;width:80px;font-size:12px}
        .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px}
        .btn{background:#4ecca3;color:#1a1a2e;border:none;padding:15px 0;border-radius:8px;font-weight:bold;font-size:18px}
        #pre,#game{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;padding:10px;box-sizing:border-box;z-index:100}
        .ball{width:90px;height:90px;background:#4ecca3;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:bold;margin:10px auto;color:#1a1a2e;border:4px solid #fff;box-shadow:0 0 15px #4ecca3}
        .ball span{font-size:14px;margin-bottom:-5px}
        .card-c{background:#fff;padding:8px;border-radius:10px;margin:0 auto;max-width:320px}
        .b-h{display:grid;grid-template-columns:repeat(5,1fr);background:#2d2d44;color:#4ecca3;font-weight:bold;padding:8px 0;border-radius:5px 5px 0 0}
        .card{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:4px}
        .cell{border:1px solid #eee;height:45px;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:50%;font-size:16px;color:#333;background:#f9f9f9}
        .mk{background:#4ecca3!important;color:#fff!important;border:none!important}
    </style>
</head>
<body onload="init()">
    <div id="main">
        <div class="stats"><div class="box">Wallet<br>0.00</div><div class="box">Stake<br>10</div></div>
        <h3 style="color:#4ecca3">ካርቴላ ይምረጡ</h3>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h3 id="sT" style="color:#4ecca3">--</h3>
        <div style="font-size:40px;color:#ff4757;font-weight:bold" id="tm">30</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="pB"></div></div>
    </div>

    <div id="game">
        <div id="bl" class="ball"><span>LETTER</span>--</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="gB"></div></div>
        <button onclick="location.reload()" style="width:100%;max-width:320px;padding:15px;margin-top:20px;background:#ff4757;color:white;border:none;border-radius:8px;font-weight:bold">አቁም</button>
    </div>

    <script>
        let sid, active = false, loop, checker;
        const gn = (a, b) => { let r = []; while(r.length < 5){ let v = Math.floor(Math.random() * (b - a + 1)) + a; if(!r.includes(v)) r.push(v); } return r; };

        function init() {
            let h = ""; for(let i=1; i<=16; i++) h += `<button class="btn" onclick="sel(${i})">${i}</button>`;
            document.getElementById('mG').innerHTML = h;
        }

        function sel(n) {
            sid = n; document.getElementById('main').style.display='none'; document.getElementById('pre').style.display='block';
            let cols = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)], h = "";
            for(let r=0; r<5; r++) for(let c=0; c<5; c++) {
                let v = (r==2 && c==2) ? 'FREE' : cols[c][r];
                h += `<div class="cell ${v=='FREE'?'mk':''}" id="c-${r*5+c}">${v}</div>`;
            }
            document.getElementById('pB').innerHTML = h; document.getElementById('gB').innerHTML = h;
            let t = 30; let cd = setInterval(() => { t--; document.getElementById('tm').innerText=t; if(t<=0){clearInterval(cd); start();} }, 1000);
        }

        function checkBingo() {
            if(!active) return;
            const cells = document.querySelectorAll('#gB .cell');
            const wins = [
               ,,,,, // አግድም
               ,,,,, // ቀጥታ
               ,, // አያያዝ
                // 4 ማዕዘን
            ];
            
            for(let w of wins) {
                if(w.every(i => cells[i].classList.contains('mk'))) {
                    active = false;
                    clearInterval(loop);
                    clearInterval(checker);
                    setTimeout(() => { alert("🎉 ቢንጎ! ካርቴላ " + sid + " አሸንፏል!"); location.reload(); }, 300);
                    break;
                }
            }
        }

        function start() {
            active = true; document.getElementById('pre').style.display='none'; document.getElementById('game').style.display='block';
            let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5), idx = 0;
            
            // ቁጥር የሚጠራበት ሉፕ
            loop = setInterval(() => {
                if(!active) return;
                let n = nums[idx++];
                let l = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
                document.getElementById('bl').innerHTML = `<span>${l}</span>${n}`;
                document.querySelectorAll('#gB .cell').forEach(c => { if(c.innerText == n) c.classList.add('mk'); });
            }, 3000);

            // አሸናፊ በየ ግማሽ ሰከንዱ የሚፈትሽ ሉፕ
            checker = setInterval(checkBingo, 500);
        }
    </script>
</body>
</html>
