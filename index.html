<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #2d2d44; padding: 10px; border-radius: 8px; text-align: center; font-size: 12px; }
        .val { display: block; font-size: 16px; font-weight: bold; color: #4ecca3; }
        .grid-container { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        .num-btn { background: #3d3d5c; color: white; border: 1px solid #555; padding: 12px 0; border-radius: 6px; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #16213e; display: flex; justify-content: space-around; padding: 12px 0; }
    </style>
</head>
<body>
    <div class="header-stats">
        <div class="stat-box">Main Wallet<span class="val">0</span></div>
        <div class="stat-box">Play Wallet<span class="val">0</span></div>
        <div class="stat-box">Stake<span class="val">10</span></div>
    </div>
    <div class="grid-container" id="bingoGrid"></div>
    <div class="nav-bar">
        <span>🎮 Game</span><span>🕒 History</span><span>💰 Wallet</span><span>👤 Profile</span>
    </div>
    <script>
        const grid = document.getElementById('bingoGrid');
        for (let i = 1; i <= 100; i++) {
            const b = document.createElement('button');
            b.className = 'num-btn';
            b.innerText = i;
            b.onclick = () => alert("ቁጥር " + i + " ተመርጧል!");
            grid.appendChild(b);
        }
    </script>
</body>
</html>
