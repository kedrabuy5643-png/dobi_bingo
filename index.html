<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo - Line Bingo Fix</title>
    <style>
        body { background:#1a1a2e; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:10px; overflow:hidden; }
        .stats { display:flex; justify-content:center; gap:10px; margin-bottom:10px; }
        .box { background:#2d2d44; padding:8px; border-radius:8px; border:1px solid #4ecca3; flex:1; font-size:12px; }
        .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; padding:10px; }
        .btn { background:#4ecca3; color:#1a1a2e; border:none; padding:12px 0; border-radius:8px; font-weight:bold; font-size:16px; }
        #pre, #game { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; padding:10px; box-sizing:border-box; z-index:100; }
        .ball { width:70px; height:70px; background:#4ecca3; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:22px; font-weight:bold; margin:10px auto; color:#1a1a2e; border:4px solid #fff; }
        .ball span { font-size:12px; }
        .card-container { background:#fff; padding:5px; border-radius:12px; margin:0 auto; max-width:320px; }
        .b-header { display:grid; grid-template-columns:repeat(5, 1fr); background:#2d2d44; color:#4ecca3; font-weight:bold; padding:5px 0; border-radius:8px 8px 0 0; }
        .card { display:grid; grid-template-columns:repeat(5, 1fr); gap:3px; margin-top:4px; }
        .cell { border:1px solid #eee; height:42px; display:flex; align-items:center; justify-content:center; font-weight:bold; border-radius:50%; font-size:14px; color:#333; background:#f9f9f9; }
        .marked { background:#4ecca3 !important; color:#fff !important; border:none !important; animation: pop 0.3s ease; }
        @keyframes pop { 0% {transform: scale(1);} 50% {transform: scale(1.2);} 100% {transform: scale(1);} }
        .stop-btn { width:100%; max-width:320px; padding:12px; margin-top:10px; background:#ff4757; color:white; border:none; border-radius:10px; font-weight:bold; }
    </style>
</head>
<body onload="init()">
    <div id="main">
        <div class="stats"><div class="box">Wallet<br>0.00</div><div class="box">Stake<br>10</div></div>
        <h2 style="color:#4ecca3;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h3>ዝግጁ?</h3>
        <div style="font-size:40px; color:#ff4757; font-weight:bold;" id="tm">10</div>
        <div class="card-container">
            <div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="pB"></div>
        </div>
    </div>

    <div id="game">
        <div id="bl" class="ball"><span>-</span>-</div>
        <div class="card-container">
            <div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="gB"></div>
        </div>
        <button class="stop-btn" onclick="location.reload()">አቁም</button>
    </div>

    <script>
        let sid, active = false, loop;
        const gn = (a, b) => { let r = []; while(r.length < 5){ let v = Math.floor(Math.random()*(b-a+1))+a; if(!r.includes(v)) r.push(v); } return r; };

        function init() {
            let h = ""; for(let i=1; i<=16; i++) h += `<button class="btn" onclick="sel(${i})">${i}</button>`;
            document.getElementById('mG').innerHTML = h;
        }

        function sel(n) {
            sid = n; document.getElementById('main').style.display='none'; document.getElementById('pre').style.display='block';
            let cols = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)];
            let h = "";
            for(let r=0; r<5; r++) for(let c=0; c<5; c++) {
                let v = (r==2 && c==2) ? 'FREE' : cols[c][r];
                h += `<div class="cell" id="c-${r}-${c}" data-v="${v}">${v}</div>`;
            }
            document.getElementById('pB').innerHTML = h;
            document.getElementById('gB').innerHTML = h;
            document.querySelectorAll('[data-v="FREE"]').forEach(el => el.classList.add('marked'));
            
            let t = 10;
            let cd = setInterval(() => { t--; document.getElementById('tm').innerText=t; if(t<=0){clearInterval(cd); start();} }, 1000);
        }

        function checkBingo() {
            const cells = document.querySelectorAll('#gB .cell');
            const isM = (i) => cells[i].classList.contains('marked');

            const winPatterns = [
                // አግድም (Rows)
               ,,,,,
                // ቁልቁል (Columns)
               ,,,,,
                // ዲያጎናል (Diagonals)
               ,,
                // አራት ማዕዘን (4 Corners)
               
            ];

            for (let p of winPatterns) {
                if (p.every(isM)) {
                    active = false;
                    clearInterval(loop);
                    setTimeout(() => { 
                        alert("🎉 ቢንጎ! ካርቴላ " + sid + " አሸንፏል!"); 
                        location.reload(); 
                    }, 400);
                    return true;
                }
            }
            return false;
        }

        function start() {
            active = true;
            document.getElementById('pre').style.display='none';
            document.getElementById('game').style.display='block';
            let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;

            loop = setInterval(() => {
                if(!active || idx >= 75) return;
                let n = nums[idx++];
                let l = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
                document.getElementById('bl').innerHTML = `<span>${l}</span>${n}`;

                document.querySelectorAll('#gB .cell').forEach(c => {
                    if(c.getAttribute('data-v') == n.toString()) {
                        c.classList.add('marked');
                    }
                });
                
                checkBingo(); // በእያንዳንዱ ቁጥር መቆጠር ላይ መስመር መሞላቱን ይፈትሻል
            }, 2500); // ፍጥነቱን ለተጫዋቾች እንዲመች 2.5 ሰከንድ አድርጌዋለሁ
        }
    </script>
</body>
</html>
