<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawi Bingo Bot</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .box { background: #2d2d44; padding: 10px; border-radius: 8px; flex: 1; margin: 5px; border: 1px solid #4ecca3; }
        .val { display: block; font-size: 16px; font-weight: bold; color: #4ecca3; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 15px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 15px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 2000; padding: 10px; }
        .ball { width: 70px; height: 70px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 15px auto; color: #1a1a2e; border: 3px solid white; }
        .card { background: white; color: #333; padding: 10px; border-radius: 10px; margin: 0 auto; max-width: 320px; }
        .c-g { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; }
        .cell { border: 1px solid #ddd; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 14px; }
        .marked { background: #4ecca3 !important; color: white; border: none; }
    </style>
</head>
<body>
    <div id="main">
        <div class="stats">
            <div class="box">Main<span class="val">0.00</span></div>
            <div class="box">Play<span class="val">0.00</span></div>
            <div class="box">Stake<span class="val">10</span></div>
        </div>
        <h2 style="color: #4ecca3;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mGrid">
            <button class="n-btn" onclick="st(1)">1</button>
            <button class="n-btn" onclick="st(2)">2</button>
            <button class="n-btn" onclick="st(3)">3</button>
            <button class="n-btn" onclick="st(4)">4</button>
            <button class="n-btn" onclick="st(5)">5</button>
            <button class="n-btn" onclick="st(6)">6</button>
            <button class="n-btn" onclick="st(7)">7</button>
            <button class="n-btn" onclick="st(8)">8</button>
            <button class="n-btn" onclick="st(9)">9</button>
            <button class="n-btn" onclick="st(10)">10</button>
            <button class="n-btn" onclick="st(11)">11</button>
            <button class="n-btn" onclick="st(12)">12</button>
            <button class="n-btn" onclick="st(13)">13</button>
            <button class="n-btn" onclick="st(14)">14</button>
            <button class="n-btn" onclick="st(15)">15</button>
        </div>
    </div>

    <div id="game">
        <div id="num" class="ball">--</div>
        <div class="card">
            <div id="g-g" class="c-g"></div>
        </div>
        <button onclick="ck()" style="width:100%; padding:15px; margin-top:20px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; color:#1a1a2e;">BINGO!</button>
    </div>

    <script>
        let sid = 0, gid = null, mks = Array(25).fill(false);
        mks = true;

        function st(id) {
            sid = id;
            let h = '';
            for(let i=0; i<25; i++) {
                let v = (i==12) ? "FREE" : Math.floor(Math.random()*75)+1;
                h += `<div class="cell ${i==12?'marked':''}" id="c${i}">${v}</div>`;
            }
            document.getElementById('g-g').innerHTML = h;
            document.getElementById('game').style.display = 'block';
            play();
        }

        function play() {
            gid = setInterval(() => {
                let n = Math.floor(Math.random()*75)+1;
                document.getElementById('num').innerText = n;
                for(let i=0; i<25; i++) {
                    let cell = document.getElementById('c'+i);
                    if(cell.innerText == n) {
                        cell.classList.add('marked');
                        mks[i] = true;
                    }
                }
            }, 3000);
        }

        function ck() { alert("ካርቴላ " + sid + " ተፈትሿል!"); location.reload(); }
    </script>
</body>
</html>
