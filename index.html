<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi Bingo</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .box { background: #2d2d44; padding: 8px; border-radius: 8px; flex: 1; margin: 3px; border: 1px solid #4ecca3; font-size: 12px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 10px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 15px 0; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #pre, #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; padding: 10px; box-sizing: border-box; z-index: 10; }
        .ball { width: 70px; height: 70px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 10px auto; color: #1a1e2e; border: 3px solid white; }
        .card-c { background: white; padding: 5px; border-radius: 10px; margin: 0 auto; max-width: 320px; }
        .b-h { display: grid; grid-template-columns: repeat(5, 1fr); background: #2d2d44; color: #4ecca3; font-weight: bold; padding: 5px 0; border-radius: 5px; }
        .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 3px; margin-top: 5px; }
        .cell { border: 1px solid #eee; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 14px; color: #333; }
        .mk { background: #4ecca3 !important; color: white; border: none; }
    </style>
</head>
<body>
    <div id="main">
        <div class="stats">
            <div class="box">Main<br>0.00</div>
            <div class="box">Play<br>0.00</div>
            <div class="box">Stake<br>10</div>
        </div>
        <h2 style="color:#4ecca3">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h3 id="sT" style="color:#4ecca3">ካርቴላ --</h3>
        <div style="font-size:30px; color:#ff4757; margin:10px" id="tm">30</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="pB"></div></div>
    </div>

    <div id="game">
        <div id="bl" class="ball">--</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="gB"></div></div>
        <button onclick="ck()" style="width:100%; padding:15px; margin-top:15px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; color:#1a1a2e;">BINGO!</button>
    </div>

    <script>
        let sid, mks = Array(25).fill(false), active = false;
        mks = true;

        for (let i = 1; i <= 16; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn'; b.innerText = i;
            b.onclick = () => {
                sid = i; document.getElementById('main').style.display = 'none';
                document.getElementById('pre').style.display = 'block';
                document.getElementById('sT').innerText = "ካርቴላ " + i;
                let c = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)], h = "";
                for(let r=0; r<5; r++) for(let col=0; col<5; col++) {
                    let v = (r==2 && col==2) ? "FREE" : c[col][r];
                    h += `<div class="cell ${v=='FREE'?'mk':''}" id="n-${v}">${v}</div>`;
                }
                document.getElementById('pB').innerHTML = h;
                document.getElementById('gB').innerHTML = h;
                let t = 30;
                let cd = setInterval(() => {
                    t--; document.getElementById('tm').innerText = t;
                    if(t <= 0) { clearInterval(cd); startG(); }
                }, 1000);
            };
            document.getElementById('mG').appendChild(b);
        }

        function gn(a, b) {
            let r = []; while(r.length < 5) { let v = Math.floor(Math.random()*(b-a+1))+a; if(!r.includes(v)) r.push(v); } return r;
        }

        function startG() {
            active = true; document.getElementById('pre').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            let p = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5), idx = 0;
            let lp = setInterval(() => {
                if(!active) { clearInterval(lp); return; }
                let n = p[idx++];
                let L = n<=15?'B':n<=30?'I':n<=45?'N':n<=60?'G':'O';
                document.getElementById('bl').innerText = L + "-" + n;
                document.querySelectorAll(`#gB .cell`).forEach((c, i) => {
                    if(c.innerText == n) { c.classList.add('mk'); mks[i] = true; if(isW()) win(); }
                });
            }, 3000);
        }

        function isW() {
            for(let i=0; i<25; i+=5) if(mks.slice(i, i+5).every(v => v)) return true;
            for(let i=0; i<5; i++) if(.every(j => mks[i+j])) return true;
            if(.every(i => mks[i]) ||.every(i => mks[i])) return true;
            if(mks && mks && mks && mks) return true;
            return false;
        }

        function win() { active = false; alert("ቢንጎ! ካርቴላ " + sid + " አሸንፏል!"); location.reload(); }
        function ck() { if(isW()) win(); else alert("ገና አልተሞላም!"); }
    </script>
</body>
</html>
