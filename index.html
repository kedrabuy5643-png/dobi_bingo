<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo</title>
    <style>
        /* ለሞባይል እንዲመጥን መጠኖችን ቀንሻለሁ */
        body{background:#1a1a2e;color:#fff;font-family:sans-serif;text-align:center;margin:0;padding:5px;overflow:hidden}
        .stats{display:flex;justify-content:center;gap:5px;margin-top:5px}
        .box{background:#2d2d44;padding:5px;border-radius:6px;border:1px solid #4ecca3;width:80px;font-size:12px}
        
        /* ምርጫዎቹ እንዲታዩ Grid ማስተካከያ */
        .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;margin-top:10px}
        .btn{background:#4ecca3;color:#1a1a2e;border:none;padding:15px 0;border-radius:8px;font-weight:bold;font-size:18px}

        #pre,#game{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a2e;padding:10px;box-sizing:border-box;z-index:100}
        .ball{width:70px;height:70px;background:#4ecca3;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;margin:10px auto;color:#1a1a2e;border:3px solid #fff}
        .card-c{background:#fff;padding:5px;border-radius:10px;margin:0 auto;max-width:300px}
        .b-h{display:grid;grid-template-columns:repeat(5,1fr);background:#2d2d44;color:#4ecca3;font-weight:bold;padding:5px 0}
        .card{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:3px}
        .cell{border:1px solid #ddd;height:40px;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:50%;font-size:14px;color:#333;background:#f9f9f9}
        .mk{background:#4ecca3!important;color:#fff!important;border:none}
    </style>
</head>
<body>
    <div id="main">
        <div class="stats">
            <div class="box">Wallet<br>0.00</div>
            <div class="box">Stake<br>10</div>
        </div>
        <h3 style="color:#4ecca3;margin:10px">ካርቴላ ይምረጡ</h3>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h4 id="sT" style="color:#4ecca3;margin:5px">ካርቴላ --</h4>
        <div style="font-size:35px;color:#ff4757;font-weight:bold" id="tm">30</div>
        <div class="card-c">
            <div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="pB"></div>
        </div>
    </div>

    <div id="game">
        <div id="bl" class="ball">--</div>
        <div class="card-c">
            <div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div>
            <div class="card" id="gB"></div>
        </div>
        <button onclick="location.reload()" style="width:100%;max-width:300px;padding:12px;margin-top:15px;background:#ff4757;color:white;border:none;border-radius:8px;font-weight:bold">ጨዋታውን አቁም</button>
    </div>

    <script>
        let sid, mks = Array(25).fill(false), active = false, loop;

        const gn = (min, max) => {
            let r = [];
            while(r.length < 5){
                let v = Math.floor(Math.random() * (max - min + 1)) + min;
                if(!r.includes(v)) r.push(v);
            }
            return r;
        };

        // ይህ ፈንክሽን በግዳጅ ምርጫዎቹን እንዲሰራ ያደርገዋል
        function createButtons() {
            const mG = document.getElementById('mG');
            let btns = "";
            for(let i=1; i<=16; i++){
                btns += `<button class="btn" onclick="selectCard(${i})">${i}</button>`;
            }
            mG.innerHTML = btns;
        }

        function selectCard(num) {
            sid = num;
            mks = Array(25).fill(false);
            mks = true;
            document.getElementById('sT').innerText = "ካርቴላ " + num;
            document.getElementById('main').style.display = 'none';
            document.getElementById('pre').style.display = 'block';
            
            let cols = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)];
            let h = "";
            for(let r=0; r<5; r++){
                for(let c=0; c<5; c++){
                    let v = (r==2 && c==2) ? 'FREE' : cols[c][r];
                    h += `<div class="cell ${v=='FREE'?'mk':''}" id="cell-${r}-${c}">${v}</div>`;
                }
            }
            document.getElementById('pB').innerHTML = h;
            document.getElementById('gB').innerHTML = h;
            
            let t = 30;
            let cd = setInterval(() => {
                t--;
                document.getElementById('tm').innerText = t;
                if(t <= 0) { clearInterval(cd); startG(); }
            }, 1000);
        }

        function checkW(){
            for(let i=0; i<25; i+=5) if(mks.slice(i, i+5).every(v=>v)) return true;
            for(let i=0; i<5; i++) if(.every(j=>mks[i+j])) return true;
            if(.every(i=>mks[i]) ||.every(i=>mks[i])) return true;
            if(mks && mks && mks && mks) return true;
            return false;
        }

        function startG(){
            active = true;
            document.getElementById('pre').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            let p = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;
            
            loop = setInterval(() => {
                if(!active) return;
                let n = p[idx++];
                document.getElementById('bl').innerText = n;
                
                let cells = document.querySelectorAll(`#gB .cell`);
                cells.forEach((cell, i) => {
                    if(cell.innerText == n.toString()){
                        cell.classList.add('mk');
                        mks[i] = true;
                    }
                });

                if(checkW()){
                    active = false;
                    clearInterval(loop);
                    setTimeout(() => { alert("ቢንጎ! አሸንፈሃል!"); location.reload(); }, 500);
                }
            }, 3000);
        }

        // ወዲያውኑ ምርጫዎቹን እንዲፈጥር መጥራት
        createButtons();
    </script>
</body>
</html>
