<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi Bingo</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .box { background: #2d2d44; padding: 10px; border-radius: 8px; flex: 1; margin: 5px; border: 1px solid #4ecca3; }
        .val { display: block; font-size: 16px; font-weight: bold; color: #4ecca3; }
        
        /* ዋናው ገጽ ቁጥሮች */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 15px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        
        #pre-game, #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 2000; padding: 15px; box-sizing: border-box; }
        
        .timer-circle { width: 80px; height: 80px; border: 5px solid #ff4757; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin: 10px auto; color: #ff4757; }
        .ball { width: 80px; height: 80px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; margin: 10px auto; color: #1a1e2e; border: 4px solid white; }

        /* የካርቴላ ዲዛይን */
        .card-container { background: white; padding: 10px; border-radius: 15px; margin: 0 auto; width: 100%; max-width: 350px; }
        .bingo-header { display: grid; grid-template-columns: repeat(5, 1fr); margin-bottom: 5px; }
        .bingo-header div { color: #1a1a2e; font-size: 24px; font-weight: bold; }
        .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .cell { border: 1px solid #eee; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 16px; color: #333; background: #fdfdfd; }
        .marked { background: #4ecca3 !important; color: white; border: none; }
    </style>
</head>
<body>

    <div id="main">
        <div class="stats">
            <div class="box">Main<span class="val">0.00</span></div>
            <div class="box">Play<span class="val">0.00</span></div>
            <div class="box">Stake<span class="val">10</span></div>
        </div>
        <h2 style="color: #4ecca3;">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mGrid"></div>
    </div>

    <div id="pre-game">
        <h2 id="sel-txt" style="color: #4ecca3;">ካርቴላ ቁጥር --</h2>
        <div class="timer-circle" id="timer">30</div>
        <div class="card-container">
            <div class="bingo-header">
                <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
            </div>
            <div class="card" id="preview-board"></div>
        </div>
    </div>

    <div id="game">
        <div id="num-ball" class="ball">--</div>
        <div class="card-container">
            <div class="bingo-header">
                <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
            </div>
            <div class="card" id="game-board"></div>
        </div>
        <button onclick="location.reload()" style="width:100%; padding:15px; margin-top:20px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; font-size:18px; color:#1a1a2e;">BINGO!</button>
    </div>

    <script>
        const mGrid = document.getElementById('mGrid');
        for (let i = 1; i <= 16; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn';
            b.innerText = i;
            b.onclick = () => showPreview(i);
            mGrid.appendChild(b);
        }

        function showPreview(id) {
            document.getElementById('main').style.display = 'none';
            document.getElementById('pre-game').style.display = 'block';
            document.getElementById('sel-txt').innerText = "ካርቴላ ቁጥር " + id;
            
            let nums = [];
            while(nums.length < 25) {
                let r = Math.floor(Math.random() * 75) + 1;
                if(!nums.includes(r)) nums.push(r);
            }

            let html = "";
            nums.forEach((n, i) => {
                let v = (i === 12) ? "FREE" : n;
                html += `<div class="cell ${i===12?'marked':''}" id="c-${v}">${v}</div>`;
            });
            
            document.getElementById('preview-board').innerHTML = html;
            document.getElementById('game-board').innerHTML = html;

            let timeLeft = 30;
            let cd = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(cd); startGame(); }
            }, 1000);
        }

        function startGame() {
            document.getElementById('pre-game').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;
            setInterval(() => {
                if(idx < 75) {
                    let n = pool[idx];
                    document.getElementById('num-ball').innerText = n;
                    let target = document.querySelector(`#game-board #c-${n}`);
                    if(target) target.classList.add('marked');
                    idx++;
                }
            }, 3000);
        }
    </script>
</body>
</html>
