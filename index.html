<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dobi Bingo</title>
    <style>
        body { background: #1a1a2e; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding-top: 10px; }
        .box { background: #2d2d44; padding: 10px; border-radius: 8px; border: 1px solid #4ecca3; min-width: 100px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 15px; }
        .n-btn { background: #4ecca3; color: #1a1a2e; border: none; padding: 20px 0; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #pre, #game { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; padding: 15px; box-sizing: border-box; z-index: 100; overflow-y: auto; }
        .ball { width: 80px; height: 80px; background: #4ecca3; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; margin: 20px auto; color: #1a1e2e; border: 4px solid white; box-shadow: 0 0 20px rgba(78, 204, 163, 0.5); }
        .card-c { background: white; padding: 10px; border-radius: 12px; margin: 0 auto; max-width: 320px; }
        .b-h { display: grid; grid-template-columns: repeat(5, 1fr); background: #2d2d44; color: #4ecca3; font-weight: bold; padding: 8px 0; border-radius: 5px; }
        .card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 8px; }
        .cell { border: 1px solid #ddd; height: 45px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 50%; font-size: 16px; color: #333; }
        .mk { background: #4ecca3 !important; color: white; border: none; }
    </style>
</head>
<body>
    <div id="main">
        <div class="stats">
            <div class="box">Wallet<br>0.00</div>
            <div class="box">Stake<br>10</div>
        </div>
        <h2 style="color:#4ecca3">Dobi Bingo</h2>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <h3 id="sT" style="color:#4ecca3">ካርቴላ --</h3>
        <div style="font-size:40px; color:#ff4757; margin:15px" id="tm">30</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="pB"></div></div>
    </div>

    <div id="game">
        <div id="bl" class="ball">--</div>
        <div class="card-c"><div class="b-h"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="gB"></div></div>
        <button onclick="location.reload()" style="width:100%; padding:18px; margin-top:20px; background:#4ecca3; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">አቁም / በድጋሚ ጀምር</button>
    </div>

    <script>
        let sid, mks = Array(25).fill(false), active = false, loop;
        mks = true; // FREE space

        const gn = (min, max) => {
            let r = []; while(r.length < 5) { let v = Math.floor(Math.random()*(max-min+1))+min; if(!r.includes(v)) r.push(v); } return r;
        };

        const mG = document.getElementById('mG');
        for (let i = 1; i <= 16; i++) {
            let b = document.createElement('button');
            b.className = 'n-btn'; b.innerText = i;
            b.onclick = () => {
                sid = i; document.getElementById('main').style.display = 'none';
                document.getElementById('pre').style.display = 'block';
                document.getElementById('sT').innerText = "ካርቴላ " + i;
                
                let columns = [gn(1,15), gn(16,30), gn(31,45), gn(46,60), gn(61,75)];
                let html = "";
                for(let row=0; row<5; row++) {
                    for(let col=0; col<5; col++) {
                        let val = (row==2 && col==2) ? "FREE" : columns[col][row];
                        html += `<div class="cell ${val=='FREE'?'mk':''}" id="cell-${val}">${val}</div>`;
                    }
                }
                document.getElementById('pB').innerHTML = html;
                document.getElementById('gB').innerHTML = html;

                let timeLeft = 30;
                let timer = setInterval(() => {
                    timeLeft--; document.getElementById('tm').innerText = timeLeft;
                    if(timeLeft <= 0) { clearInterval(timer); startG(); }
                }, 1000);
            };
            mG.appendChild(b);
        }

        function checkWin() {
            // Horizontal
            for(let i=0; i<25; i+=5) if(mks.slice(i, i+5).every(v => v)) return true;
            // Vertical
            for(let i=0; i<5; i++) if(.every(j => mks[i+j])) return true;
            // Diagonal
            if(.every(i => mks[i])) return true;
            if(.every(i => mks[i])) return true;
            // Corners
            if(mks && mks && mks && mks) return true;
            return false;
        }

        function startG() {
            active = true;
            document.getElementById('pre').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            let pool = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let idx = 0;

            loop = setInterval(() => {
                if(!active) return;
                if(idx < 75) {
                    let num = pool[idx++];
                    let letter = num<=15?'B':num<=30?'I':num<=45?'N':num<=60?'G':'O';
                    document.getElementById('bl').innerText = letter + "-" + num;

                    let currentCells = document.querySelectorAll(`#gB .cell`);
                    currentCells.forEach((cell, i) => {
                        if(cell.innerText == num.toString()) {
                            cell.classList.add('mk');
                            mks[i] = true;
                        }
                    });

                    if(checkWin()) {
                        active = false;
                        clearInterval(loop);
                        setTimeout(() => {
                            alert("ቢንጎ! ካርቴላ " + sid + " አሸንፏል!");
                            location.reload();
                        }, 500);
                    }
                }
            }, 3000);
        }
    </script>
</body>
</html>
