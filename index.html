<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dobi Bingo Final</title>
    <style>
        body { background:#1a1a2e; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:10px; }
        .stats { display:flex; justify-content:center; gap:10px; margin-bottom:15px; }
        .box { background:#2d2d44; padding:10px; border-radius:8px; border:1px solid #4ecca3; flex:1; max-width:120px; font-size:14px; }
        .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; padding:10px; }
        .btn { background:#4ecca3; color:#1a1a2e; border:none; padding:15px 0; border-radius:8px; font-weight:bold; font-size:18px; }
        #pre, #game { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#1a1a2e; padding:15px; box-sizing:border-box; z-index:100; }
        .ball { width:100px; height:100px; background:#4ecca3; border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:28px; font-weight:bold; margin:20px auto; color:#1a1a2e; border:5px solid #fff; }
        .card-container { background:#fff; padding:10px; border-radius:12px; margin:0 auto; max-width:350px; }
        .b-header { display:grid; grid-template-columns:repeat(5, 1fr); background:#2d2d44; color:#4ecca3; font-weight:bold; padding:10px 0; border-radius:8px 8px 0 0; }
        .card { display:grid; grid-template-columns:repeat(5, 1fr); gap:5px; margin-top:5px; }
        .cell { border:1px solid #ddd; height:50px; display:flex; align-items:center; justify-content:center; font-weight:bold; border-radius:50%; font-size:16px; color:#333; background:#f0f0f0; }
        /* አረንጓዴ የሚሆንበት ክላስ */
        .mk { background:#4ecca3 !important; color:#fff !important; }
        .stop-btn { width:100%; max-width:350px; padding:18px; margin-top:25px; background:#ff4757; color:white; border:none; border-radius:10px; font-weight:bold; }
    </style>
</head>
<body onload="init()">
    <div id="main">
        <div class="stats"><div class="box">Wallet<br>0.00</div><div class="box">Stake<br>10</div></div>
        <h2 style="color:#4ecca3">ካርቴላ ይምረጡ</h2>
        <div class="grid" id="mG"></div>
    </div>

    <div id="pre">
        <div style="font-size:50px; color:#ff4757; font-weight:bold" id="tm">30</div>
        <div class="card-container"><div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="pB"></div></div>
    </div>

    <div id="game">
        <div id="bl" class="ball"><span>-</span>-</div>
        <div class="card-container"><div class="b-header"><div>B</div><div>I</div><div>N</div><div>G</div><div>O</div></div><div class="card" id="gB"></div></div>
        <button class="stop-btn" onclick="location.reload()">አቁም</button>
    </div>

    <script>
        let sid, active = false, loop;
        const getRandom = (a, b) => { 
            let r = []; 
            while(r.length < 5){ 
                let v = Math.floor(Math.random() * (b - a + 1)) + a; 
                if(!r.includes(v)) r.push(v); 
            } 
            return r; 
        };

        function init() {
            let h = ""; for(let i=1; i<=16; i++) h += `<button class="btn" onclick="sel(${i})">${i}</button>`;
            document.getElementById('mG').innerHTML = h;
        }

        function sel(n) {
            sid = n; document.getElementById('main').style.display='none'; document.getElementById('pre').style.display='block';
            let cols = [getRandom(1,15), getRandom(16,30), getRandom(31,45), getRandom(46,60), getRandom(61,75)];
            let h = "";
            for(let r=0; r<5; r++) for(let c=0; c<5; c++) {
                let v = (r==2 && c==2) ? 'FREE' : cols[c][r];
                h += `<div class="cell ${v=='FREE'?'mk':''}" data-val="${v}">${v}</div>`;
            }
            document.getElementById('pB').innerHTML = h;
            document.getElementById('gB').innerHTML = h;
            let t = 30;
            let cd = setInterval(() => { t--; document.getElementById('tm').innerText=t; if(t<=0){clearInterval(cd); start();} }, 1000);
        }

        function checkBingo() {
            const cells = document.querySelectorAll('#gB .cell');
            const isMarked = (i) => cells[i].classList.contains('mk');
            
            const winPatterns = [
               ,,,,, // Horizontal
               ,,,,, // Vertical
               ,, // Diagonal
                // Corners
            ];

            for (let pattern of winPatterns) {
                if (pattern.every(isMarked)) return true;
            }
            return false;
        }

        function start() {
            active = true;
            document.getElementById('pre').style.display='none';
            document.getElementById('game').style.display='block';
            
            let allNums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            let i = 0;

            loop = setInterval(() => {
                if(!active) return;
                
                let n = allNums[i++];
                let l = n<=15?"B":n<=30?"I":n<=45?"N":n<=60?"G":"O";
                document.getElementById('bl').innerHTML = `<span>${l}</span>${n}`;

                // ሳጥኑን አረንጓዴ የማድረጊያ ክፍል
                const cells = document.querySelectorAll('#gB .cell');
                cells.forEach(c => {
                    if(c.getAttribute('data-val') == n.toString()) {
                        c.classList.add('mk');
                    }
                });

                // ቢንጎ መኖሩን በእያንዳንዱ ቁጥር መፈተሽ
                if (checkBingo()) {
                    active = false;
                    clearInterval(loop);
                    setTimeout(() => {
                        alert("🎉 ቢንጎ! ካርቴላ " + sid + " አሸንፏል!");
                        location.reload();
                    }, 500);
                }

                if(i >= 75) clearInterval(loop);
            }, 2500); // ፍጥነቱን ትንሽ ጨምሬዋለሁ (2.5 ሰከንድ)
        }
    </script>
</body>
</html>
